name: Build & Deploy to IPFS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-pin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Pin to IPFS via Pinata
        id: pinata
        uses: anantaramdas/ipfs-pinata@v1.1.2
        with:
          pinata-api-key: ${{ secrets.PINATA_API_KEY }}
          pinata-secret-api-key: ${{ secrets.PINATA_SECRET_API_KEY }}
          path-to-pin: ./dist
          pin-name: verity-${{ github.sha }}

      - name: Print deployment URLs
        run: |
          CID="${{ steps.pinata.outputs.hash }}"
          echo "============================================"
          echo "  Verity deployed to IPFS"
          echo "============================================"
          echo ""
          echo "  CID: ${CID}"
          echo ""
          echo "  IPFS Gateway:"
          echo "  https://ipfs.io/ipfs/${CID}"
          echo ""
          echo "  Cloudflare IPFS:"
          echo "  https://cloudflare-ipfs.com/ipfs/${CID}"
          echo ""
          echo "  dweb.link:"
          echo "  https://${CID}.ipfs.dweb.link"
          echo ""
          echo "============================================"

      - name: Update ENS contenthash
        run: npx tsx scripts/ens-update.ts "${{ steps.pinata.outputs.hash }}"
        env:
          ENS_DOMAIN: ${{ secrets.ENS_DOMAIN }}
          PRIVATE_KEY: ${{ secrets.ENS_PRIVATE_KEY }}
          RPC_URL: ${{ secrets.RPC_URL }}

      - name: Add deployment summary
        run: |
          CID="${{ steps.pinata.outputs.hash }}"
          echo "## IPFS Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**CID:** \`${CID}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| IPFS | https://ipfs.io/ipfs/${CID} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cloudflare | https://cloudflare-ipfs.com/ipfs/${CID} |" >> $GITHUB_STEP_SUMMARY
          echo "| dweb.link | https://${CID}.ipfs.dweb.link |" >> $GITHUB_STEP_SUMMARY
